apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arbitrage-ingress
  namespace: arbitrage-bot
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: arbitrage-bot.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: arbitrage-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: arbitrage-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arbitrage-frontend
                port:
                  number: 80
