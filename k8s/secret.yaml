apiVersion: v1
kind: Secret
metadata:
  name: arbitrage-bot-secrets
  namespace: arbitrage-bot
type: Opaque
stringData:
  KALSHI_API_KEY_ID: "your-api-key-id-here"
  # Base64 encode your private key and put it here, or mount from a file
  # kalshi_private_key.pem: |
  #   -----BEGIN RSA PRIVATE KEY-----
  #   ...
  #   -----END RSA PRIVATE KEY-----
